name: Trading Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1-5"    # 9:30 IST
    - cron: "30 7 * * 1-5"   # 1:00 IST
    - cron: "0 10 * * 1-5"   # 3:30 IST

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install pandas yfinance scikit-learn requests

      - run: python bot_runner.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
