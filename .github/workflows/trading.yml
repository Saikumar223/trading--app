name: Trading Bot

on:
  workflow_dispatch:
  schedule:
    # 🔁 Run every 30 minutes during Indian market hours (9:00–16:00 IST)
    - cron: "*/30 4-10 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install pandas yfinance scikit-learn requests

      - name: Run Trading Bot
        run: python bot_runner.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
