name: Trading Bot

on:
  workflow_dispatch:

  schedule:
    # 9:15 AM IST (Market Open)
    - cron: "45 3 * * 1-5"

    # 12:30 PM IST (Midday)
    - cron: "0 7 * * 1-5"

    # 3:30 PM IST (Market Close)
    - cron: "0 10 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas yfinance scikit-learn requests

      - name: Run Bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot_runner.py
