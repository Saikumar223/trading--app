name: Trading Bot

on:
  workflow_dispatch:

  schedule:
    # Runs every hour (Monday to Friday)
    - cron: "0 * * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # Checkout your repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install Dependencies
        run: |
          pip install pandas yfinance requests pytz

      # Run bot
      - name: Run Trading Bot
        run: python bot_runner.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
